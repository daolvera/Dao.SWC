# Run when commits are pushed to main
on:
  workflow_dispatch:
    inputs:
      provision:
        description: 'Run azd provision to update infrastructure (default: false, code deploy only)'
        required: false
        default: 'false'
        type: boolean
  push:
    # Run when commits are pushed to mainline branch (main or master)
    # Set this to the mainline branch you are using
    branches:
      - main

# Set up permissions for deploying with secretless Azure federated credentials
# https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure?tabs=azure-portal%2Clinux#set-up-azure-login-with-openid-connect-authentication
permissions:
  id-token: write
  contents: read


jobs:
  build:
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Install azd
        uses: Azure/setup-azd@v2
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: | 
            8.x
            9.x
            10.x

      - name: Log in with Azure (Federated Credentials)
        run: |
          azd auth login `
            --client-id "$Env:AZURE_CLIENT_ID" `
            --federated-credential-provider "github" `
            --tenant-id "$Env:AZURE_TENANT_ID"
        shell: pwsh


      - name: Provision Infrastructure
        if: ${{ github.event.inputs.provision == 'true' }}
        run: azd provision --no-prompt
        env:
          AZURE_SWCPOSTGRES_PASSWORD: ${{ secrets.AZURE_SWCPOSTGRES_PASSWORD }}
          AZURE_APICUSTOMDOMAIN: ${{ vars.AZURE_APICUSTOMDOMAIN }}
          AZURE_APICERTIFICATENAME: ${{ vars.AZURE_APICERTIFICATENAME }}
          AZURE_APPCUSTOMDOMAIN: ${{ vars.AZURE_APPCUSTOMDOMAIN }}
          AZURE_APPCERTIFICATENAME: ${{ vars.AZURE_APPCERTIFICATENAME }}

      - name: Refresh Environment (code deploy only)
        if: ${{ github.event.inputs.provision != 'true' }}
        run: azd env refresh --no-prompt
        env:
          AZURE_SWCPOSTGRES_PASSWORD: ${{ secrets.AZURE_SWCPOSTGRES_PASSWORD }}
          AZURE_APICUSTOMDOMAIN: ${{ vars.AZURE_APICUSTOMDOMAIN }}
          AZURE_APICERTIFICATENAME: ${{ vars.AZURE_APICERTIFICATENAME }}
          AZURE_APPCUSTOMDOMAIN: ${{ vars.AZURE_APPCUSTOMDOMAIN }}
          AZURE_APPCERTIFICATENAME: ${{ vars.AZURE_APPCERTIFICATENAME }}

      - name: Deploy Application
        run: azd deploy --no-prompt
        env:
          AZURE_SWCPOSTGRES_PASSWORD: ${{ secrets.AZURE_SWCPOSTGRES_PASSWORD }}
          AZURE_APICUSTOMDOMAIN: ${{ vars.AZURE_APICUSTOMDOMAIN }}
          AZURE_APICERTIFICATENAME: ${{ vars.AZURE_APICERTIFICATENAME }}
          AZURE_APPCUSTOMDOMAIN: ${{ vars.AZURE_APPCUSTOMDOMAIN }}
          AZURE_APPCERTIFICATENAME: ${{ vars.AZURE_APPCERTIFICATENAME }}
        
