<svg xmlns="http://www.w3.org/2000/svg" width="200" height="280" viewBox="0 0 200 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Card background -->
  <rect width="200" height="280" rx="10" ry="10" fill="url(#bg)"/>

  <!-- Border -->
  <rect x="5" y="5" width="190" height="270" rx="8" ry="8" fill="none" stroke="#e94560" stroke-width="2"/>

  <!-- Inner decoration -->
  <rect x="15" y="15" width="170" height="250" rx="5" ry="5" fill="none" stroke="#0f3460" stroke-width="1"/>

  <!-- Center glow -->
  <ellipse cx="100" cy="140" rx="60" ry="60" fill="url(#glow)"/>

  <!-- Star Wars inspired symbol (abstract) -->
  <circle cx="100" cy="140" r="40" fill="none" stroke="#e94560" stroke-width="3"/>
  <circle cx="100" cy="140" r="25" fill="none" stroke="#0f3460" stroke-width="2"/>
  <circle cx="100" cy="140" r="10" fill="#e94560"/>

  <!-- Corner decorations -->
  <path d="M20,30 L40,30 L30,50 Z" fill="#0f3460"/>
  <path d="M180,30 L160,30 L170,50 Z" fill="#0f3460"/>
  <path d="M20,250 L40,250 L30,230 Z" fill="#0f3460"/>
  <path d="M180,250 L160,250 L170,230 Z" fill="#0f3460"/>

  <!-- Text -->
  <text x="100" y="220" text-anchor="middle" fill="#e94560" font-family="Arial, sans-serif" font-size="12" font-weight="bold">STAR WARS</text>
  <text x="100" y="235" text-anchor="middle" fill="#0f3460" font-family="Arial, sans-serif" font-size="10">TCG</text>
</svg>
