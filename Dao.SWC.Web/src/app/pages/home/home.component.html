<div class="container py-4">
  <div class="row">
    <div class="col-12">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h1 class="mb-2">Dao Star Wars Cards</h1>
          <p class="lead mb-0">Build your deck and battle opponents in this strategic card game.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="row mt-4">
    <div class="col-md-6 mb-4">
      <div class="card h-100 border-primary">
        <div class="card-body text-center py-5">
          <i class="bi bi-controller display-1 text-primary mb-3"></i>
          <h3 class="card-title">Play Now</h3>
          <p class="card-text text-muted">Create or join a game room to battle other players.</p>
          <button class="btn btn-primary btn-lg" (click)="navigateTo('/play')">
            <i class="bi bi-play-fill me-2"></i>Enter Lobby
          </button>
        </div>
      </div>
    </div>

    <div class="col-md-6 mb-4">
      <div class="card h-100 border-success">
        <div class="card-body text-center py-5">
          <i class="bi bi-stack display-1 text-success mb-3"></i>
          <h3 class="card-title">My Decks</h3>
          <p class="card-text text-muted">Build and manage your card decks for battle.</p>
          <button class="btn btn-success btn-lg" (click)="navigateTo('/decks')">
            <i class="bi bi-collection me-2"></i>View Decks
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
