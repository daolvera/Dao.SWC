<!-- Backdrop -->
<div
  class="sidebar-backdrop"
  [class.show]="navigationService.sidebarOpen$ | async"
  (click)="closeSidebar()"
></div>

<!-- Sidebar -->
<aside class="sidebar" [class.show]="navigationService.sidebarOpen$ | async">
  <div class="sidebar-header">
    <h5 class="mb-0">Menu</h5>
    <button type="button" class="btn-close" aria-label="Close" (click)="closeSidebar()"></button>
  </div>

  <nav class="sidebar-nav">
    <ul class="nav flex-column">
      @for (item of navigationItems(); track item.route) {
        <li class="nav-item">
          <a
            class="nav-link"
            [routerLink]="item.route"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: item.route === '/' }"
            (click)="closeSidebar()"
          >
            @if (item.icon) {
              <i class="bi bi-{{ item.icon }} me-2"></i>
            }
            {{ item.label }}
          </a>
        </li>
      }
    </ul>
  </nav>

  <div class="sidebar-footer mt-auto p-3 border-top">
    @if (authService.isAuthenticated()) {
      <div class="text-muted small mb-2">
        {{ authService.userInfo()?.name || authService.userInfo()?.email }}
      </div>
      <button class="btn btn-outline-danger w-100" (click)="logout()">
        <i class="bi bi-box-arrow-right me-2"></i>Logout
      </button>
    } @else {
      <button class="btn btn-primary w-100" (click)="login()">
        <i class="bi bi-box-arrow-in-right me-2"></i>Login
      </button>
    }
  </div>
</aside>
